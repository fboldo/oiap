name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Lerna version bump or explicit semver. Use conventional to infer from commits."
        required: true
        type: choice
        default: conventional
        options:
          - conventional
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      npm-tag:
        description: "npm dist-tag to publish."
        required: true
        type: choice
        default: latest
        options:
          - latest
          - next
          - beta
          - alpha
      dry-run:
        description: "Build and pack packages without versioning, publishing, or pushing tags."
        required: false
        type: boolean
        default: true
      publish-auth:
        description: "Publish auth mode. Use trusted-publishing for normal releases or npm-token when bootstrapping a brand-new package."
        required: true
        type: choice
        default: trusted-publishing
        options:
          - trusted-publishing
          - npm-token

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Release packages
    needs: ci
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
      VERSION_INPUT: ${{ inputs.version }}
      NPM_TAG: ${{ inputs.npm-tag }}
      PUBLISH_AUTH_INPUT: ${{ inputs.publish-auth }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        if: ${{ !inputs.dry-run && inputs.publish-auth == 'trusted-publishing' }}
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lerna package check
        run: bun run release:list

      - name: Build packages
        run: bun run build

      - name: Guard release branch
        if: ${{ !inputs.dry-run && github.ref != 'refs/heads/main' }}
        run: |
          echo "Releases can only publish from refs/heads/main. Current ref: ${{ github.ref }}" >&2
          exit 1

      - name: Configure release git identity
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Dry-run package tarballs
        if: ${{ inputs.dry-run }}
        run: |
          for package_dir in packages/*; do
            if [ -f "$package_dir/package.json" ]; then
              echo "::group::npm pack --dry-run $package_dir"
              (cd "$package_dir" && npm pack --dry-run)
              echo "::endgroup::"
            fi
          done

      - name: Verify npm token
        if: ${{ !inputs.dry-run && inputs.publish-auth == 'npm-token' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required when publish-auth is npm-token." >&2
            exit 1
          fi

      - name: Version packages
        if: ${{ !inputs.dry-run }}
        run: |
          if [ "$VERSION_INPUT" = "conventional" ]; then
            bunx lerna version --no-push --no-commit-hooks --yes
          else
            bunx lerna version "$VERSION_INPUT" --no-push --no-commit-hooks --yes
          fi

      - name: Publish packages with npm trusted publishing
        if: ${{ !inputs.dry-run && inputs.publish-auth == 'trusted-publishing' }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: bun run release:publish -- --yes --dist-tag "$NPM_TAG"

      - name: Publish packages with npm token
        if: ${{ !inputs.dry-run && inputs.publish-auth == 'npm-token' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: bun run release:publish -- --yes --dist-tag "$NPM_TAG"

      - name: Push release commit and tags
        if: ${{ !inputs.dry-run }}
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Read release metadata
        id: release_metadata
        if: ${{ always() }}
        run: |
          version=$(node -p "require('./lerna.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version input:** $VERSION_INPUT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Resolved version:** ${{ steps.release_metadata.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm tag:** $NPM_TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Publish auth:** $PUBLISH_AUTH_INPUT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run:** ${{ inputs.dry-run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"